# =============================================================================
# Kitty Terminal Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Font
# -----------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Disable ligatures (set to always to enable)
font_features JetBrainsMonoNFM-Regular +liga +calt

# -----------------------------------------------------------------------------
# Cursor
# -----------------------------------------------------------------------------
cursor_shape           block
cursor_blink_interval  0

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
scrollback_lines 10000

# -----------------------------------------------------------------------------
# Performance
# -----------------------------------------------------------------------------
repaint_delay   10
input_delay     3
sync_to_monitor yes

# -----------------------------------------------------------------------------
# Window
# -----------------------------------------------------------------------------
window_padding_width    8
hide_window_decorations no
remember_window_size    yes
initial_window_width    220c
initial_window_height   50c

# -----------------------------------------------------------------------------
# Bell
# -----------------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0

# -----------------------------------------------------------------------------
# Terminal
# -----------------------------------------------------------------------------
term xterm-kitty

# -----------------------------------------------------------------------------
# Catppuccin Mocha Theme
# -----------------------------------------------------------------------------
# Palette
# Rosewater #f5e0dc  Flamingo  #f2cdcd  Pink    #f5c2e7  Mauve   #cba6f7
# Red       #f38ba8  Maroon    #eba0ac  Peach   #fab387  Yellow  #f9e2af
# Green     #a6e3a1  Teal      #94e2d5  Sky     #89dceb  Sapphire #74c7ec
# Blue      #89b4fa  Lavender  #b4befe  Text    #cdd6f4
# Subtext1  #bac2de  Subtext0  #a6adc8  Overlay2 #9399b2  Overlay1 #7f849c
# Overlay0  #6c7086  Surface2  #585b70  Surface1 #45475a  Surface0 #313244
# Base      #1e1e2e  Mantle    #181825  Crust   #11111b

foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

cursor                  #f5e0dc
cursor_text_color       #1e1e2e

url_color               #f5e0dc

# Window borders
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# Tab bar
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Marks
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# 16 terminal colors
