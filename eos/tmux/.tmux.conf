# =============================================================================
# Tmux Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g history-limit 100000
set -g escape-time 0          # no delay on Esc (important for vim)
set -g repeat-time 600        # longer repeat timeout for pane resize
set -g focus-events on        # pass focus events through (vim autoread etc.)
set -g renumber-windows on    # keep window numbers gapless on close
set -g allow-rename off       # don't let programs rename windows
setw -g aggressive-resize on  # size to active window, not smallest client
setw -g monitor-activity on   # highlight windows with activity
set -g visual-activity off

# -----------------------------------------------------------------------------
# Terminal / True Color
# -----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -g extended-keys on       # modern replacement for xterm-keys

# -----------------------------------------------------------------------------
# Vi mode
# -----------------------------------------------------------------------------
setw -g mode-keys vi

bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'

# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits — keep current path
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resize
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# -----------------------------------------------------------------------------
# Status bar — Catppuccin Mocha
# -----------------------------------------------------------------------------

# Catppuccin Mocha palette
base="#1e1e2e"
mantle="#181825"
surface0="#313244"
surface1="#45475a"
overlay0="#6c7086"
subtext0="#a6adc8"
text="#cdd6f4"
blue="#89b4fa"
mauve="#cba6f7"
sapphire="#74c7ec"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g status-style                "bg=$base,fg=$text"

# Left: session name
set -g status-left                 "#[fg=$base,bg=$blue,bold] #S #[fg=$blue,bg=$base]"
set -g status-left-length          20

# Right: date and time
set -g status-right                "#[fg=$surface0,bg=$base]#[fg=$text,bg=$surface0] %d %b  #[fg=$blue,bg=$surface0]#[fg=$base,bg=$blue,bold] %H:%M "
set -g status-right-length         30

# Windows
set -g window-status-separator     ""
set -g window-status-format        "#[fg=$overlay0,bg=$base]  #I #W  "
set -g window-status-current-format "#[fg=$base,bg=$mauve,bold]  #I #W  #[fg=$mauve,bg=$base]"

# Pane borders
set -g pane-border-style           "fg=$surface1"
set -g pane-active-border-style    "fg=$blue"

# Message / command prompt
set -g message-style               "bg=$surface0,fg=$text"
set -g message-command-style       "bg=$surface0,fg=$text"

# Copy mode highlight
set -g mode-style                  "bg=$mauve,fg=$base"
