"$schema" = 'https://starship.rs/config-schema.json'

palette = 'catppuccin_mocha'

# Line 1: dir + git | right-aligned: langs + k8s + duration
# Line 2: prompt character
format = """
$directory\
$git_branch\
$git_status\
$fill\
$golang\
$python\
$nodejs\
$kubernetes\
$cmd_duration\
\n\
$character"""

# -----------------------------------------------------------------------------
# Directory
# -----------------------------------------------------------------------------
[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

# -----------------------------------------------------------------------------
# Git
# -----------------------------------------------------------------------------
[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "mauve"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# -----------------------------------------------------------------------------
# Languages — only appear when relevant files are detected
# -----------------------------------------------------------------------------
[golang]
format = "[ $version]($style) "
style = "sky"

[python]
format = '[$symbol$virtualenv]($style) '
symbol = " "
style = "yellow"
detect_files      = []
detect_extensions = []
detect_folders    = []

[nodejs]
format = "[ $version]($style) "
style = "green"

# -----------------------------------------------------------------------------
# Kubernetes — show context when kubectl is configured
# -----------------------------------------------------------------------------
[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "󱃾 "
style = "sapphire"

# -----------------------------------------------------------------------------
# Command duration — show for commands taking longer than 3s
# -----------------------------------------------------------------------------
[cmd_duration]
min_time = 3000
format = "[ $duration]($style)"
style = "peach"

# -----------------------------------------------------------------------------
# Prompt character
# -----------------------------------------------------------------------------
[character]
success_symbol  = "[❯](green)"
error_symbol    = "[❯](red)"
vimcmd_symbol   = "[❮](mauve)"

# -----------------------------------------------------------------------------
# Disabled noise
# -----------------------------------------------------------------------------
[package]
disabled = true
[aws]
disabled = true
[gcloud]
disabled = true

[fill]
symbol = " "

# -----------------------------------------------------------------------------
# Catppuccin Mocha palette
# -----------------------------------------------------------------------------
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
